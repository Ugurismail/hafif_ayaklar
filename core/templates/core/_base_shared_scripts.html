	        <script>
	            (function () {
	                const pending = [];
                    let mathReady = false;

	                window.hafifAyaklarRenderMath = function (root) {
	                    const target = root || document.body;
	                    if (!window.MathJax || typeof window.MathJax.typesetPromise !== 'function' || !mathReady) {
	                        pending.push(target);
	                        return;
	                    }
	                    try {
	                        window.MathJax.typesetPromise([target]);
	                    } catch (e) {
	                        // silent
	                    }
	                };

	                window.__hafifAyaklarMathPending = pending;
                    window.__hafifAyaklarSetMathReady = function () { mathReady = true; };
	            })();

		            window.MathJax = {
		                loader: { load: ['[tex]/ams'] },
		                tex: {
	                    inlineMath: [['$', '$']],
	                    displayMath: [['$$', '$$']],
	                    processEscapes: true,
	                    packages: { '[+]': ['ams'] },
	                },
	                options: {
	                    skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'],
	                },
	                startup: {
	                    typeset: false,
	                    ready: () => {
	                        MathJax.startup.defaultReady();
                            if (typeof window.__hafifAyaklarSetMathReady === 'function') {
                                window.__hafifAyaklarSetMathReady();
                            }
	                        const roots = window.__hafifAyaklarMathPending || [];
	                        window.__hafifAyaklarMathPending = [];
                            const uniqueRoots = [document.body, ...roots.filter(Boolean)];
                            try {
                                MathJax.typesetPromise(uniqueRoots);
                            } catch (e) {
                                // silent
                            }
	                    },
	                },
	            };
	        </script>

        $(document).ready(function() {
    var toastEl = document.getElementById('randomToast');
    var toast   = new bootstrap.Toast(toastEl);
    var csrftoken = $('meta[name="csrf-token"]').attr('content');

    // Rastgele cümleyi çeker
    $('#help-btn').click(function() {
        // help btn basılınca random cümle çek
        $.ajax({
            url: "{% url 'get_random_sentence' %}",
            method: "GET",
            success: function(data) {
                // data = { id: xx, sentence: '...', upvotes: N, downvotes: M }
                $('#randomSentenceText').text(data.sentence);

                // Cümle id bilgisini butonlara set edelim
                $('#ignoreRandomBtn').data('sentence-id', data.id);
                $('#upvoteRandomBtn').data('sentence-id', data.id);
                $('#downvoteRandomBtn').data('sentence-id', data.id);

                // Vote sayılarını göster
                $('#randomUpvotes').text(data.upvotes || 0);
                $('#randomDownvotes').text(data.downvotes || 0);

                // Butonları görünür yap
                $('#ignoreRandomBtn').show();
                $('#randomVoteSection').css('display', 'flex');

                toast.show();
            }
        });
    });

    // “+” butonuna basıldığında modal aç
    $('#addSentenceBtn').click(function() {
        var addModal = new bootstrap.Modal(document.getElementById('addSentenceModal'), {
            backdrop: 'static',
            keyboard: false
        });
        addModal.show();
    });

    // Yeni cümle ekleme formu
    $('#addRandomSentenceForm').on('submit', function(e) {
        e.preventDefault();
        $.ajax({
            url: "{% url 'add_random_sentence' %}",
            method: "POST",
            data: $(this).serialize(),
            headers: {'X-CSRFToken': csrftoken},
            success: function(data) {
                if(data.status == 'success') {
                    showToast(data.message, 'success');
                    $('#addRandomSentenceForm textarea[name="sentence"]').val('');
                    var addModalEl = document.getElementById('addSentenceModal');
                    var addModal   = bootstrap.Modal.getInstance(addModalEl);
                    addModal.hide();
                } else {
                    let errorMsg = "Hata:\n";
                    for (let field in data.errors) {
                        data.errors[field].forEach((err) => {
                            errorMsg += err.message + "\n";
                        });
                    }
                    showToast(errorMsg, 'error');
                }
            }
        });
    });

    // "Bir Daha Gösterme" butonuna tıklayınca
    $('#ignoreRandomBtn').click(function() {
        const sentenceId = $(this).data('sentence-id');
        if (!sentenceId) return;

        $.ajax({
            url: "{% url 'ignore_random_sentence' %}",
            method: "POST",
            data: { sentence_id: sentenceId },
            headers: { 'X-CSRFToken': csrftoken },
            success: function(data) {
                if(data.status === 'success') {
                    // İsteğe göre toast'ı kapatabilir,
                    // veya "Bu cümle bir daha gösterilmeyecek" mesajı verebilirsiniz.
                    toast.hide();
                    showToast(data.message, 'success');
                } else {
                    showToast(data.message || "Bir hata oluştu.", 'error');
                }
            }
        });
    });

    // Upvote butonu
    $('#upvoteRandomBtn').click(function() {
        const sentenceId = $(this).data('sentence-id');
        if (!sentenceId) return;

        $.ajax({
            url: "{% url 'vote_random_sentence' %}",
            method: "POST",
            data: {
                sentence_id: sentenceId,
                vote_type: 'up'
            },
            headers: { 'X-CSRFToken': csrftoken },
            success: function(data) {
                if(data.status === 'success') {
                    $('#randomUpvotes').text(data.upvotes);
                    $('#randomDownvotes').text(data.downvotes);
                } else {
                    showToast(data.message || "Bir hata oluştu.", 'error');
                }
            }
        });
    });

    // Downvote butonu
    $('#downvoteRandomBtn').click(function() {
        const sentenceId = $(this).data('sentence-id');
        if (!sentenceId) return;

        $.ajax({
            url: "{% url 'vote_random_sentence' %}",
            method: "POST",
            data: {
                sentence_id: sentenceId,
                vote_type: 'down'
            },
            headers: { 'X-CSRFToken': csrftoken },
            success: function(data) {
                if(data.status === 'success') {
                    $('#randomUpvotes').text(data.upvotes);
                    $('#randomDownvotes').text(data.downvotes);
                } else {
                    showToast(data.message || "Bir hata oluştu.", 'error');
                }
            }
        });
    });
});
</script>

  <!-- Global Toast & Confirm Functions -->
  <script>
    // showToast() is now in base.js (loaded globally)
    // getCookie() is now in base.js (loaded globally)

    // Convert Django messages to toasts on page load
    document.addEventListener('DOMContentLoaded', function() {
      const messagesContainer = document.getElementById('django-messages');
      if (messagesContainer) {
        const messages = messagesContainer.querySelectorAll('[data-message]');
        messages.forEach(function(msgElement) {
          const message = msgElement.getAttribute('data-message');
          let tags = msgElement.getAttribute('data-tags') || 'info';

          // Map Django message tags to toast types
          let toastType = 'info';
          if (tags.includes('success')) toastType = 'success';
          else if (tags.includes('error') || tags.includes('danger')) toastType = 'error';
          else if (tags.includes('warning')) toastType = 'warning';

          // Show toast with appropriate type
          showToast(message, toastType, 4000);
        });
      }
    });

    // Global Confirm Dialog (replaces window.confirm)
    function showConfirm(message, title = 'Onay', btnText = 'Tamam', btnClass = 'btn-theme-primary') {
      return new Promise((resolve) => {
        const modal = document.getElementById('globalConfirmModal');
        const titleEl = document.getElementById('globalConfirmTitleText');
        const bodyEl = document.getElementById('globalConfirmBody');
        const confirmBtn = document.getElementById('globalConfirmBtn');

        titleEl.textContent = title;
        bodyEl.textContent = message;
        confirmBtn.textContent = btnText;
        confirmBtn.className = 'btn ' + btnClass;

        const bsModal = new bootstrap.Modal(modal);

        // Remove old listeners
        const newConfirmBtn = confirmBtn.cloneNode(true);
        confirmBtn.parentNode.replaceChild(newConfirmBtn, confirmBtn);

        newConfirmBtn.onclick = () => {
          bsModal.hide();
          resolve(true);
        };

        modal.addEventListener('hidden.bs.modal', () => {
          resolve(false);
        }, { once: true });

        bsModal.show();
      });
    }
  </script>
